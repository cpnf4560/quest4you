<!DOCTYPE html>

<body>
  <header class="header">
    <div class="header-content">
      <a href="../index.html" class="logo">
        <img src="../assets/quest4you_transp.png" alt="Quest4You" class="logo-img">
        <span class="logo-text">Quest4You</span>

    </div>

  <main class="quiz-container">
    <div class="quiz-header" id="quizHeader">
      <div class="quiz-icon" id="quizIcon"></div>
      <h1 class="quiz-title" id="quizTitle">Carregando...</h1>
      <p class="quiz-description" id="quizDescription"></p>
    </div>
    <div class="progress-container">
      <div class="progress-info">
        <span id="progressText">Pergunta 1 de 50</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNumber">1</div>
      <p class="question-text" id="questionText">Carregando pergunta...</p>
      <div class="likert-scale">
        <div class="likert-labels">
          <span class="likert-label-left">Discordo Totalmente</span>
          <span class="likert-label-right">Concordo Totalmente</span>
        </div>
        <div class="likert-options" id="likertOptions">
          <button class="likert-btn" data-value="1" onclick="selectAnswer(1)">
            <span class="likert-number">1</span>
            <span class="likert-emoji">&#128544;</span>
          </button>
          <button class="likert-btn" data-value="2" onclick="selectAnswer(2)">
            <span class="likert-number">2</span>
            <span class="likert-emoji">&#128533;</span>
          </button>
          <button class="likert-btn" data-value="3" onclick="selectAnswer(3)">
            <span class="likert-number">3</span>
            <span class="likert-emoji">&#128528;</span>
          </button>
          <button class="likert-btn" data-value="4" onclick="selectAnswer(4)">
            <span class="likert-number">4</span>
            <span class="likert-emoji">&#128578;</span>
          </button>
          <button class="likert-btn" data-value="5" onclick="selectAnswer(5)">
            <span class="likert-number">5</span>
            <span class="likert-emoji">&#128525;</span>
          </button>
        </div>
      </div>
    </div>
    <div class="quiz-navigation">
      <button class="btn btn-secondary" id="btnPrev" onclick="previousQuestion()" disabled>&#8592; Anterior</button>
      <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()" disabled>PrÃ³xima &#8594;</button>
      <button class="btn btn-success" id="btnFinish" onclick="finishQuiz()" style="display: none;">Ver Resultado &#127881;</button>
    </div>
    <div class="quick-nav">

    <div class="result-content">
      <button class="result-close" onclick="closeResult()">&#215;</button>

        <div class="result-emoji" id="resultEmoji">&#127881;</div>
        <h2 class="result-title" id="resultTitle">O Teu Resultado</h2>
      </div>
      <div class="result-body">
        <div class="result-score-container">
          <div class="result-score-circle" id="resultScoreCircle">
            <span class="result-score-value" id="resultScore">75</span>
            <span class="result-score-label">pontos</span>

          <span class="result-category-emoji" id="resultCategoryEmoji">&#128293;</span>
          <span class="result-category-label" id="resultCategoryLabel">Categoria</span>
        </div>
        <p class="result-description" id="resultDescription">DescriÃ§Ã£o do resultado...</p>
        <div class="result-breakdown" id="resultBreakdown"></div>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" onclick="shareResult()">&#128228; Partilhar</button>
        <button class="btn btn-secondary" onclick="retakeQuiz()">&#128260; Refazer</button>
        <a href="../index.html" class="btn btn-outline">&#127968; InÃ­cio</a>
      </div>
    </div>
  </div>
