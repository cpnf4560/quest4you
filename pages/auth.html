<!DOCTYPE html>
<html lang="pt-PT">
<head>

  <script type="text/javascript">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="auth.pageTitle">Entrar / Criar Conta - Quest4You</title>
  <meta name="description" content="Entra ou cria conta gratuita no Quest4You. Guarda os teus resultados, encontra pessoas compatíveis com o Smart Match e participa na comunidade.">
  <meta name="theme-color" content="#C41E3A">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://quest4you.com/pages/auth.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://quest4you.com/pages/auth.html">
  <meta property="og:title" content="Entrar / Criar Conta - Quest4You">
  <meta property="og:description" content="Cria conta gratuita no Quest4You. Guarda os teus resultados e encontra pessoas compatíveis.">  <meta property="og:image" content="https://quest4you.com/assets/quest4you_transp.png">
  <meta property="og:site_name" content="Quest4You">

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" href="../assets/quest4you_transp.png">
  <link rel="manifest" href="../manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/dark-mode.css?v=202602080003">
</head>
<body>
  <div class="auth-container">
    <!-- Auth Box -->
    <div class="auth-box">
      <!-- Logo -->
      <div class="auth-logo">
        <a href="../index.html">
          <img src="../assets/quest4you_transp.png" alt="Quest4You">
        </a>
        <h1>Quest4You</h1>
        <p class="tagline" data-i18n="auth.tagline">Descobre-te a ti mesmo 🔥</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" data-i18n="auth.loginTab">Entrar</button>
        <button class="auth-tab" data-tab="register" data-i18n="auth.registerTab">Criar Conta</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="loginForm">
        <div class="social-buttons">
          <button class="btn-google" onclick="loginWithGoogle()">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span data-i18n="auth.continueGoogle">Continuar com Google</span>
          </button>
        </div>

        <div class="divider">
          <span data-i18n="auth.or">ou</span>
        </div>

        <form onsubmit="loginWithEmail(event)">
          <div class="form-group">
            <label for="loginEmail" data-i18n="auth.email">📧 Email</label>
            <input type="email" id="loginEmail" data-i18n-placeholder="auth.emailPlaceholder" placeholder="o-teu@email.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword" data-i18n="auth.password">🔒 Palavra-passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
          </div>
          <button type="submit" class="btn-submit" data-i18n="auth.loginBtn">
            Entrar
          </button>
        </form>

        <div class="auth-footer">
          <a href="#" onclick="showResetPassword()" data-i18n="auth.forgotPassword">Esqueceste a palavra-passe?</a>
        </div>
      </div>

      <!-- Register Form -->
      <div class="auth-form" id="registerForm">
        <div class="social-buttons">
          <button class="btn-google" onclick="loginWithGoogle()">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span data-i18n="auth.registerGoogle">Registar com Google</span>
          </button>
        </div>

        <div class="divider">
          <span data-i18n="auth.or">ou</span>
        </div>

        <form onsubmit="registerWithEmail(event)">
          <div class="form-group">
            <label for="registerName" data-i18n="auth.name">👤 Nome</label>
            <input type="text" id="registerName" data-i18n-placeholder="auth.namePlaceholder" placeholder="O teu nome" required minlength="2">
          </div>
          <div class="form-group">
            <label for="registerEmail" data-i18n="auth.email">📧 Email</label>
            <input type="email" id="registerEmail" data-i18n-placeholder="auth.emailPlaceholder" placeholder="o-teu@email.com" required>
          </div>
          <div class="form-group">
            <label for="registerGender" data-i18n="auth.gender">⚧ Género</label>
            <select id="registerGender" required>
              <option value="" data-i18n="auth.genderSelect">Seleciona...</option>
              <option value="masculino" data-i18n="auth.genderMale">Masculino</option>
              <option value="feminino" data-i18n="auth.genderFemale">Feminino</option>
              <option value="nao-binario" data-i18n="auth.genderNonBinary">Não-binário</option>
              <option value="outro" data-i18n="auth.genderOther">Outro / Prefiro não dizer</option>
            </select>
          </div>
          <div class="form-group">
            <label for="registerPassword" data-i18n="auth.password">🔒 Palavra-passe</label>
            <input type="password" id="registerPassword" data-i18n-placeholder="auth.passwordMin" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <div class="form-group">
            <label for="registerPasswordConfirm" data-i18n="auth.confirmPassword">🔒 Confirmar Palavra-passe</label>
            <input type="password" id="registerPasswordConfirm" data-i18n-placeholder="auth.confirmPlaceholder" placeholder="Repete a palavra-passe" required minlength="6">
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" id="acceptTerms" required>
            <label for="acceptTerms"><span data-i18n="auth.acceptTerms">Aceito os</span> <a href="./termos.html" target="_blank">Termos de Uso</a> <span data-i18n="auth.andWord">e</span> <a href="./privacidade.html" target="_blank">Política de Privacidade</a></label>
          </div>
          <button type="submit" class="btn-submit" data-i18n="auth.createBtn">
            Criar Conta
          </button>
        </form>
      </div>

      <!-- Reset Password Form -->
      <div class="auth-form" id="resetForm">
        <h2 data-i18n="auth.resetTitle">🔑 Recuperar Palavra-passe</h2>
        <p class="reset-info" data-i18n="auth.resetDesc">Introduz o teu email e enviaremos um link para redefinires a palavra-passe.</p>
        <form onsubmit="resetPassword(event)">
          <div class="form-group">
            <label for="resetEmail" data-i18n="auth.email">📧 Email</label>
            <input type="email" id="resetEmail" data-i18n-placeholder="auth.emailPlaceholder" placeholder="o-teu@email.com" required>
          </div>
          <button type="submit" class="btn-submit" data-i18n="auth.sendLink">
            Enviar Link
          </button>
        </form>
        <div class="auth-footer">
          <a href="#" onclick="showLogin()" data-i18n="auth.backToLogin">← Voltar ao Login</a>
        </div>
      </div>

      <!-- Messages -->
      <div class="auth-message" id="authMessage"></div>
    </div>

    <!-- Back to Home -->
    <div class="back-home">
      <a href="../index.html" data-i18n="auth.backHome">← Voltar à página inicial</a>
    </div>
  </div>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js?v=202601202240"></script>
  <script src="../js/dark-mode.js?v=202602080002"></script>
  <script src="../js/i18n.js?v=202602080100"></script>
  <script src="../js/auth.js?v=202601202240"></script>
</body>
</html>
